version: 2

models:
  - name: stg_customers
    description: "Danh sách khách hàng của Olist. Mỗi khách hàng có một customer_id duy nhất cho mỗi đơn hàng."
    columns:
      - name: customer_id
        description: "Mã định danh khách hàng cho mỗi đơn hàng. Kết nối với bảng orders."
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "Mã định danh duy nhất của khách hàng (dùng để nhận diện khách hàng quay lại)."
      - name: zip_code_prefix
        description: "5 chữ số đầu của mã bưu điện khách hàng."
      - name: customer_city
        description: "Tên thành phố nơi khách hàng sinh sống."
      - name: customer_state
        description: "Tên bang nơi khách hàng sinh sống."

  - name: stg_geolocation
    description: "Thông tin tọa độ địa lý dựa trên mã bưu điện tại Brazil."
    columns:
      - name: zip_code_prefix
        description: "Mã bưu điện (đã được làm sạch để đảm bảo duy nhất)."
        tests:
          - unique 
          - not_null
      - name: latitude
        description: "Vĩ độ của khu vực."
      - name: longitude
        description: "Kinh độ của khu vực."
      - name: city
        description: "Thành phố tương ứng với mã bưu điện."
      - name: state
        description: "Bang tương ứng với mã bưu điện."

  - name: stg_order_items
    description: "Chi tiết các sản phẩm trong từng đơn hàng."
    columns:
      - name: order_item_pk
        description: "Khóa chính tự tạo (Surrogate Key) kết hợp từ order_id và order_item_id."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Mã định danh đơn hàng."
        tests:
          - not_null
      - name: order_item_id
        description: "Số thứ tự của sản phẩm trong cùng một đơn hàng."
      - name: product_id
        description: "Mã định danh sản phẩm."
      - name: seller_id
        description: "Mã định danh người bán."
      - name: shipping_limit_at
        description: "Ngày giới hạn người bán phải bàn giao sản phẩm cho đơn vị vận chuyển."
      - name: price
        description: "Giá của sản phẩm."
      - name: freight_value
        description: "Phí vận chuyển của sản phẩm."

  - name: stg_order_payment
    description: "Thông tin về các phương thức thanh toán của đơn hàng."
    columns:
      - name: order_payment_pk
        description: "Khóa chính tự tạo cho mỗi giao dịch thanh toán."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Mã định danh đơn hàng."
        tests:
          - not_null
      - name: payment_sequential
        description: "Số thứ tự nếu khách hàng sử dụng nhiều phương thức thanh toán cho 1 đơn."
      - name: payment_type
        description: "Phương thức thanh toán (credit_card, boleto, voucher, v.v.)."
      - name: payment_installments
        description: "Số kỳ trả góp."
      - name: payment_amount
        description: "Số tiền thanh toán."

  - name: stg_order_reviews
    description: "Các bài đánh giá từ khách hàng sau khi nhận hàng."
    columns:
      - name: order_review_pk
        description: "Khóa chính tự tạo cho mỗi bài đánh giá."
        tests:
          - unique
          - not_null
      - name: review_id
        description: "Mã định danh bài đánh giá gốc."
      - name: order_id
        description: "Mã định danh đơn hàng được đánh giá."
      - name: review_score
        description: "Điểm đánh giá từ 1 đến 5."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]
              quote: false
      - name: review_comment_title
        description: "Tiêu đề của bài đánh giá."
      - name: review_comment_message
        description: "Nội dung phản hồi từ khách hàng."
      - name: review_created_at
        description: "Ngày khách hàng nhận được yêu cầu đánh giá."
      - name: review_answered_at
        description: "Ngày khách hàng gửi đánh giá."

  - name: stg_orders
    description: "Thông tin tổng quan về vòng đời của một đơn hàng."
    columns:
      - name: order_id
        description: "Mã định danh duy nhất của đơn hàng."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Mã khách hàng (theo từng đơn hàng)."
      - name: order_status
        description: "Trạng thái đơn hàng (delivered, shipped, canceled, v.v.)."
      - name: purchased_at
        description: "Thời điểm khách hàng đặt hàng."
      - name: approved_at
        description: "Thời điểm thanh toán được phê duyệt."
      - name: delivered_carrier_at
        description: "Thời điểm đơn vị vận chuyển tiếp nhận hàng."
      - name: delivered_at
        description: "Thời điểm khách hàng thực tế nhận được hàng."
      - name: estimated_delivery_at
        description: "Ngày giao hàng dự kiến thông báo cho khách hàng."

  - name: stg_products
    description: "Thông tin chi tiết về các sản phẩm được bán trên sàn."
    columns:
      - name: product_id
        description: "Mã định danh sản phẩm."
      - name: product_category_name
        description: "Tên danh mục sản phẩm (Tiếng Bồ Đào Nha)."
      - name: product_name_length
        description: "Độ dài tên sản phẩm tính theo số ký tự."
      - name: product_description_length
        description: "Độ dài mô tả sản phẩm."
      - name: product_photos_qty
        description: "Số lượng ảnh của sản phẩm."
      - name: product_weight_g
        description: "Trọng lượng sản phẩm (grams)."
      - name: product_length_cm
        description: "Chiều dài sản phẩm (cm)."
      - name: product_height_cm
        description: "Chiều cao sản phẩm (cm)."
      - name: product_width_cm
        description: "Chiều rộng sản phẩm (cm)."

  - name: stg_sellers
    description: "Thông tin về những người bán tham gia sàn Olist."
    columns:
      - name: seller_id
        description: "Mã định danh người bán."
      - name: zip_code_prefix
        description: "Mã bưu điện của khu vực người bán."
      - name: seller_city
        description: "Thành phố của người bán."
      - name: seller_state
        description: "Bang của người bán."

  - name: stg_product_category_name_translation
    description: "Bảng tra cứu để dịch tên danh mục sản phẩm."
    columns:
      - name: product_category_name_portuguese
        description: "Tên danh mục gốc bằng Tiếng Bồ Đào Nha."
      - name: product_category_name_english
        description: "Tên danh mục tương ứng bằng Tiếng Anh."