        data_type: string
        description: ""
        tests:
          - unique 
          - not_null

      - name: latitude
        data_type: float64
        description: ""

      - name: longitude
        data_type: float64
        description: ""

      - name: city
        data_type: string
        description: ""

      - name: state
        data_type: string
        description: ""

